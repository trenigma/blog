baseURL = "https://blog.trenigma.dev/"
languageCode = "en-us"
title = "Views From the Treehouse"
theme = "timber-glass"

[params]
  description = "Infrastructure, climbing, and learning in public"
  author = "Derek Ogletree"
  email = "tree7@protonmail.com"

  # Hero section
  heroTitle = "Infrastructure, climbing, and learning in public"
  heroTagline = "SRE/DevOps engineer building in the PNW. Writing about systems, side projects, and the occasional debugging adventure."

  # Navigation
  showAboutPage = false

  # Author CTA at end of posts
  showAuthorCTA = true

  # Footer
  footerText = 'Built by a climber, for readers. Powered by Hugo + GitHub Pages. <a href="/index.xml" style="color: var(--glass-turquoise); margin-left: var(--space-2);">RSS Feed</a>'

  # Syntax highlighting
  highlightStyle = "github-dark"

# Custom nav links (must be after flat [params] keys due to TOML scoping rules)
[[params.customNav]]
  name = "About"
  url = "https://beta.trenigma.dev/about.html"

[[params.customNav]]
  name = "BETA"
  url = "https://beta.trenigma.dev"

